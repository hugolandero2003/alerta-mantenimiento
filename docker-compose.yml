version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: alerta_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: alerta_mantenimiento
      POSTGRES_USER: alerta_user
      POSTGRES_PASSWORD: alerta_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: alerta_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@alerta.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
